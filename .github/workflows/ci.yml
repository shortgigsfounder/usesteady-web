name: CI

# Runs on every push to main and on every PR targeting main.
# Both jobs must pass before a production deploy is allowed.
#
# Jobs:
#   build   — next build (TypeScript compile + bundle, catches broken imports)
#   smoke   — Playwright E2E smoke suite against the production build
#
# The deploy workflow watches for this workflow to complete with conclusion
# 'success' before promoting to Vercel production.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Production build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (next build)
        run: npm run build

      - name: Lint
        run: npm run lint

  # ─── 2. Smoke tests (Playwright against production build) ────────────────────
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build again in this job — the site builds in ~10s and artifact sharing
      # between jobs is unreliable with Next.js's .next/ output structure.
      - name: Build (next build)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-failures-${{ github.run_number }}
          path: test-results/
          retention-days: 7
